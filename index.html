<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Canvas Text Particle Hover Colors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: black;
      overflow: hidden;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particlesArray = [];

    const config = {
      text: "WELCOME\nHERE\nABDUL WAHID\nKHAN",
      font: "Montserrat",
      resolution: 3
    };

    const mouse = {
      x: null,
      y: null,
      radius: 140
    };

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.x;
      mouse.y = e.y;
    });

    window.addEventListener("mouseout", () => {
      mouse.x = null;
      mouse.y = null;
    });

    class Particle {
      constructor(x, y) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.baseX = x;
        this.baseY = y;
        this.size = 2;
        this.density = Math.random() * 50 + 1;

        this.color = { r: 255, g: 255, b: 255 };
        this.baseColor = { r: 255, g: 255, b: 255 };
      }

      draw() {
        ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fill();
      }

      update() {
        if (mouse.x === null || mouse.y === null) {
          this.resetColor();
          this.returnToBase();
          return;
        }

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < mouse.radius) {
          const force = (mouse.radius - distance) / mouse.radius;
          this.x -= dx / distance * force * this.density;
          this.y -= dy / distance * force * this.density;

          // 🎨 Dynamic color based on distance
          this.color.r = 255;
          this.color.g = Math.floor(180 + 120 * force);
          this.color.b = Math.floor(255 * force);
        } else {
          this.resetColor();
          this.returnToBase();
        }
      }

      resetColor() {
        this.color.r += (this.baseColor.r - this.color.r) * 0.1;
        this.color.g += (this.baseColor.g - this.color.g) * 0.1;
        this.color.b += (this.baseColor.b - this.color.b) * 0.1;
      }

      returnToBase() {
        this.x += (this.baseX - this.x) * 0.1;
        this.y += (this.baseY - this.y) * 0.1;
      }
    }

    function init() {
      particlesArray = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const fontSize = Math.min(canvas.width / 6, 120);
      ctx.fillStyle = "white";
      ctx.font = `900 ${fontSize}px ${config.font}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const lines = config.text.split("\n");
      const lineHeight = fontSize * 1.1;
      const totalHeight = lines.length * lineHeight;
      const startY = canvas.height / 2 - totalHeight / 2 + lineHeight / 2;

      lines.forEach((line, i) => {
        ctx.fillText(line, canvas.width / 2, startY + i * lineHeight);
      });

      const textData = ctx.getImageData(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < canvas.height; y += config.resolution) {
        for (let x = 0; x < canvas.width; x += config.resolution) {
          const index = (y * canvas.width + x) * 4;
          if (textData.data[index + 3] > 128) {
            particlesArray.push(new Particle(x, y));
          }
        }
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesArray.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      init();
    });

    init();
    animate();
  </script>

</body>

</html>
